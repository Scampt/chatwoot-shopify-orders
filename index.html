<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos Shopify</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f9fc;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #orders-container {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Esperando datos de Chatwoot...</p>
  </div>
  
  <iframe id="orders-container" style="display:none;"></iframe>

  <script>
    console.log('=== DASHBOARD V2 - PostMessage Listener ===');
    
    let dataReceived = false;
    
    window.addEventListener('message', function(event) {
      console.log('📨 RAW PostMessage from:', event.origin);
      console.log('📨 RAW Data type:', typeof event.data);
      console.log('📨 RAW Data:', event.data);
      
      // Ignorar mensajes que no sean de Chatwoot
      if (event.origin !== 'https://chat.jousfit.com') {
        console.log('❌ Mensaje ignorado - origen no permitido:', event.origin);
        return;
      }
      
      // PARSEAR si es string
      let parsedData;
      if (typeof event.data === 'string') {
        try {
          parsedData = JSON.parse(event.data);
          console.log('✅ JSON parseado exitosamente');
          console.log('✅ Parsed event:', parsedData.event);
        } catch (e) {
          console.error('❌ Error parseando JSON:', e);
          return;
        }
      } else {
        parsedData = event.data;
        console.log('✅ Data ya es objeto');
      }
      
      console.log('🔍 Verificando estructura...');
      console.log('🔍 parsedData.event:', parsedData.event);
      console.log('🔍 Comparación:', parsedData.event === 'appContext');
      
      // Verificar estructura
      if (!parsedData || parsedData.event !== 'appContext') {
        console.log('❌ Mensaje ignorado - no es appContext');
        console.log('❌ parsedData:', parsedData);
        return;
      }
      
      if (dataReceived) {
        console.log('⚠️ Datos ya recibidos, ignorando...');
        return;
      }
      
      dataReceived = true;
      console.log('✅ appContext recibido!');
      
      try {
        const email = parsedData.data?.conversation?.meta?.sender?.email;
        // Después de extraer el email, ANTES de construir la URL
      const identityCompleted = parsedData.data?.contact?.custom_attributes?.identity_completed;
      
      console.log('🔍 Identity completed:', identityCompleted);
      
      if (!identityCompleted) {
        console.log('❌ Cliente no verificado');
        document.getElementById('loading').innerHTML = `
          <div style="text-align: center; padding: 40px; color: #6b7280;">
            <div style="font-size: 48px; margin-bottom: 12px;">🔒</div>
            <p><strong>Cliente no verificado</strong></p>
            <p style="font-size: 13px; margin-top: 8px; opacity: 0.7;">
              Los pedidos se mostrarán después de completar la verificación
            </p>
          </div>
        `;
        return;
      }
      
      console.log('✅ Cliente verificado, cargando pedidos...');
        console.log('🔍 Extrayendo email...');
        console.log('🔍 Email encontrado:', email);
        
        if (!email) {
          throw new Error('Email no encontrado en el mensaje');
        }
        
        // Construir URL de V13
        const v13Url = 'https://jousfit-n8n.q3fy2l.easypanel.host/webhook/customer-orders?email=' + encodeURIComponent(email);
        
        console.log('🚀 Cargando pedidos desde:', v13Url);
        
        // Ocultar loading y mostrar iframe
        document.getElementById('loading').style.display = 'none';
        const iframe = document.getElementById('orders-container');
        iframe.src = v13Url;
        iframe.style.display = 'block';
        
        console.log('✅ Iframe cargado con éxito');
        
      } catch (error) {
        console.error('❌ Error procesando mensaje:', error);
        document.getElementById('loading').innerHTML = '<p style="color: #dc2626;">Error: ' + error.message + '</p>';
      }
    }, false);
    
    console.log('✅ Listener activo, esperando PostMessage...');
    
    // Timeout de 15 segundos
    setTimeout(() => {
      if (!dataReceived) {
        console.warn('⚠️ No se recibió PostMessage en 15 segundos');
        document.getElementById('loading').innerHTML = '<p style="color: #f59e0b;">No se recibieron datos de Chatwoot</p>';
      }
    }, 15000);
  </script>
</body>
</html>
