<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos Shopify</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f7f9fc;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #orders-container {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Esperando datos de Chatwoot...</p>
  </div>
  
  <iframe id="orders-container" style="display:none;"></iframe>

  <script>
  console.log('=== DASHBOARD APP - PostMessage Listener ===');
  
  let dataReceived = false;
  
  window.addEventListener('message', function(event) {
    // Ignorar mensajes que no sean de Chatwoot
    if (event.origin !== 'https://chat.jousfit.com') {
      console.log('Mensaje ignorado - origen:', event.origin);
      return;
    }
    
    console.log('📨 PostMessage recibido (raw):', event.data);
    
    // PARSEAR si es string
    let data = event.data;
    if (typeof data === 'string') {
      try {
        data = JSON.parse(data);
        console.log('✅ JSON parseado:', data);
      } catch (e) {
        console.error('❌ Error parseando JSON:', e);
        return;
      }
    }
    
    // Verificar estructura
    if (!data || data.event !== 'appContext') {
      console.log('Mensaje ignorado - no es appContext');
      return;
    }
    
    if (dataReceived) {
      console.log('Datos ya recibidos, ignorando...');
      return;
    }
    
    dataReceived = true;
    
    try {
      const email = data.data?.conversation?.meta?.sender?.email;
      
      if (!email) {
        throw new Error('Email no encontrado en el mensaje');
      }
      
      console.log('✅ Email extraído:', email);
      
      // Construir URL de V13
      const v13Url = 'https://jousfit-n8n.q3fy2l.easypanel.host/webhook/customer-orders?email=' + encodeURIComponent(email);
      
      console.log('🚀 Cargando pedidos desde:', v13Url);
      
      // Ocultar loading y mostrar iframe
      document.getElementById('loading').style.display = 'none';
      const iframe = document.getElementById('orders-container');
      iframe.src = v13Url;
      iframe.style.display = 'block';
      
    } catch (error) {
      console.error('❌ Error procesando mensaje:', error);
      document.getElementById('loading').innerHTML = '<p style="color: #dc2626;">Error: ' + error.message + '</p>';
    }
  }, false);
  
  // Log inicial
  console.log('Listener activo, esperando PostMessage de Chatwoot...');
  
  // Timeout de 10 segundos
  setTimeout(() => {
    if (!dataReceived) {
      console.warn('⚠️ No se recibió PostMessage en 10 segundos');
      document.getElementById('loading').innerHTML = '<p style="color: #f59e0b;">No se recibieron datos de Chatwoot</p>';
    }
  }, 10000);
</script>
</body>
</html>
